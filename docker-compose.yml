services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: immigration
      POSTGRES_PASSWORD: immigration_dev
      POSTGRES_DB: immigration_roadmap
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immigration"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
